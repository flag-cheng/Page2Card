<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- soft pastel sky: warm pink upper-left fading to lilac right -->
    <linearGradient id="sky" x1="0" y1="0" x2="0.9" y2="0.5">
      <stop offset="0" stop-color="#fce7f3"/>
      <stop offset="0.45" stop-color="#f1ecfb"/>
      <stop offset="1" stop-color="#e4dafb"/>
    </linearGradient>

    <linearGradient id="ribbonBlue" x1="0.1" y1="0.1" x2="0.9" y2="0.9">
      <stop offset="0" stop-color="#d6c9fb"/>
      <stop offset="0.5" stop-color="#b69cf3"/>
      <stop offset="1" stop-color="#9069e8"/>
    </linearGradient>
    <linearGradient id="ribbonPink" x1="0" y1="0.2" x2="1" y2="0.8">
      <stop offset="0" stop-color="#fbd6ea"/>
      <stop offset="0.6" stop-color="#efd9f3"/>
      <stop offset="1" stop-color="#ddd0fb"/>
    </linearGradient>
    <linearGradient id="ribbonPale" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3eefe"/>
      <stop offset="1" stop-color="#e7defb"/>
    </linearGradient>

    <radialGradient id="bloom" cx="0.22" cy="0.14" r="0.6">
      <stop offset="0" stop-color="#fff6e8" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fff6e8" stop-opacity="0"/>
    </radialGradient>

    <!-- feathering blurs of different strengths for layered silk -->
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="softer" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
    <filter id="edge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- pastel sky + warm bloom -->
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#bloom)"/>

  <!-- back ribbon: very soft, low opacity, sets the deep fold -->
  <path d="M -150,560
           C 380,470 760,720 1180,610
           C 1520,520 1740,360 2100,420
           L 2100,1200 L -150,1200 Z"
        fill="url(#ribbonBlue)" opacity="0.30" filter="url(#softer)"/>

  <!-- pink/lilac mid ribbon, feathered, overlapping the blue -->
  <path d="M -150,820
           C 320,700 620,900 980,800
           C 1320,705 1600,560 2100,640
           L 2100,1200 L -150,1200 Z"
        fill="url(#ribbonPink)" opacity="0.45" filter="url(#soft)"/>

  <!-- main blue wave, the dominant flowing fold -->
  <path d="M -150,900
           C 360,760 700,980 1080,860
           C 1420,752 1680,600 2100,690
           L 2100,1200 L -150,1200 Z"
        fill="url(#ribbonBlue)" opacity="0.55" filter="url(#soft)"/>

  <!-- pale lilac fill nestled in the crest, strongly feathered so it blends -->
  <path d="M -150,1010
           C 320,890 640,1050 1000,950
           C 1360,848 1660,720 2100,800
           L 2100,1200 L -150,1200 Z"
        fill="url(#ribbonPale)" opacity="0.30" filter="url(#softer)"/>
</svg>
